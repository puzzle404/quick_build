<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Quick Build — Operations Console</title>
<meta name="viewport" content="width=1440, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    /* V1 Graphite (default) */
    --bg:            oklch(98.5% 0.004 90);
    --bg-raised:    oklch(99.5% 0.003 90);
    --bg-sunken:    oklch(96.5% 0.005 85);
    --ink:          oklch(18% 0.012 270);
    --ink-2:        oklch(35% 0.012 270);
    --ink-3:        oklch(55% 0.010 270);
    --ink-4:        oklch(72% 0.008 270);
    --line:         oklch(91% 0.005 270);
    --line-2:       oklch(86% 0.006 270);
    --accent:       oklch(55% 0.22 255);        /* cobalto */
    --accent-ink:   oklch(99% 0.003 255);
    --accent-soft:  oklch(94% 0.04 255);
    --ok:           oklch(58% 0.14 155);
    --warn:         oklch(72% 0.16 75);
    --bad:          oklch(55% 0.18 25);
    --info:         oklch(60% 0.13 220);

    --density-row: 32px;   /* compact / cozy / relaxed set by tweaks */
    --density-pad: 10px;
    --density-font: 13px;

    --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Geist Mono', 'SFMono-Regular', Menlo, monospace;

    --radius: 6px;
    --radius-sm: 4px;
  }

  [data-theme="night"] {
    --bg:          oklch(18% 0.015 250);
    --bg-raised:   oklch(22% 0.015 250);
    --bg-sunken:   oklch(15% 0.015 250);
    --ink:         oklch(96% 0.005 250);
    --ink-2:       oklch(80% 0.010 250);
    --ink-3:       oklch(62% 0.010 250);
    --ink-4:       oklch(45% 0.010 250);
    --line:        oklch(28% 0.015 250);
    --line-2:      oklch(34% 0.018 250);
    --accent:      oklch(78% 0.17 75);        /* amber safety */
    --accent-ink:  oklch(18% 0.05 75);
    --accent-soft: oklch(30% 0.08 75);
    --ok:          oklch(72% 0.15 155);
    --warn:        oklch(78% 0.17 75);
    --bad:         oklch(68% 0.19 25);
    --info:        oklch(72% 0.14 220);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--font-ui);
    font-size: var(--density-font);
    font-feature-settings: "cv11", "ss01", "ss03";
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
  .tnum { font-variant-numeric: tabular-nums; }

  #root { min-height: 100vh; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* Selection */
  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* Keyboard chip */
  .kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 5px;
    border: 1px solid var(--line-2);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--ink-3);
    background: var(--bg-raised);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/chrome.jsx"></script>
<script type="text/babel" src="src/screens/dashboard.jsx"></script>
<script type="text/babel" src="src/screens/projects-list.jsx"></script>
<script type="text/babel" src="src/screens/project.jsx"></script>
<script type="text/babel" src="src/screens/materials.jsx"></script>
<script type="text/babel" src="src/screens/planning.jsx"></script>
<script type="text/babel" src="src/screens/blueprints.jsx"></script>
<script type="text/babel" src="src/screens/team.jsx"></script>
<script type="text/babel" src="src/screens/documents.jsx"></script>
<script type="text/babel" src="src/screens/new-project.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
