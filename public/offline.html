<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sin conexión · QuickBuild</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; padding: 32px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #fbfaf8; color: #17181c;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #17181c; color: #fbfaf8; }
    }
    img { width: 72px; height: 72px; border-radius: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin: 0; }
    p { margin: 0; max-width: 30ch; font-size: 14px; opacity: .7; line-height: 1.5; }
    button {
      margin-top: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: #2563eb; color: #fff;
    }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="QuickBuild">
  <h1>Sin conexión</h1>
  <p>No pudimos cargar esta página. Revisá tu conexión a internet e intentá de nuevo.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
